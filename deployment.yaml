apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8-proj
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8-proj
  template:
    metadata:
      labels:
        app: k8-proj
    spec:
      containers:
        - name: k8-proj
          image: doodlesvee/k8-proj:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          readinessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
