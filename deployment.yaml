apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8-proj
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8-proj
  template:
    metadata:
      labels:
        app: k8-proj
    spec:
      containers:
      - name: k8-proj
        image: doodlesvee/k8-proj:latest
        ports:
        - containerPort: 3000